services:
  - type: web
    name: epl-analytics
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "18"
    autoDeploy: true
    repo: https://github.com/lucaseiros-lab/epl-analytics
