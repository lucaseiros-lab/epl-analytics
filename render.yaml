services:
  - type: web
    name: epl-consultores
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "18.17.0"
    autoDeploy: true
    healthCheckPath: /dashboard
